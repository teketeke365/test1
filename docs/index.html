<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>英単語練習帳!!<!DOCTYPE html>       
    <html lang="ja"> -->
    <title>英単語練習帳</title>
    <!-- <head> -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- <title>Document</title> -->
        <!-- ★追加: Google API ライブラリの読み込み [1, 3] -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script src="https://apis.google.com/js/api.js" async defer></script>
        <link rel="stylesheet" href="style.css">
    <!-- </head> -->
    <!-- <body>
        
    </body> -->
    <!-- </html></title> -->
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<body>
    <!-- ★追加: Google Drive同期用コントロールパネル -->
    <div id="drive-controls" class="sync-panel">
        <button id="authBtn" onclick="handleAuthClick()">Googleログイン</button>
        <button id="saveDriveBtn" onclick="saveToDrive()" disabled>Driveへ保存(CSV)</button>
        <button id="loadDriveBtn" onclick="loadFromDrive()" disabled>Driveから読み込み</button>
        <span id="sync-status">未ログイン</span>
    </div>
    <nav>
        <button onclick="switchMode('wordbook')">単語帳モード</button>
        <button onclick="switchMode('test')">テストモード</button>
    </nav>

    <!-- 単語帳モード -->
    <div id="wordbook-mode" class="mode">
        <h2>新規単語登録</h2>

        <div id="form">
            <input type="text" id="wordInput" placeholder="英語・熟語">
            <input type="text" id="meaningInput" placeholder="日本語">
            <button id="addBtn">追加</button>
        </div>
        
        <h2>単語一覧（作成順）</h2>
        <button onclick="toggleHideWord()">英語を隠す</button>
        <button onclick="toggleHideMeaning()">日本語を隠す</button>
        <button onclick="resetProgress()">▶</button>
        <span>：始めからやり直す</span>
        <div class="table-wrapper">
        <!-- <table id="table"> -->
        <table>
            <!-- <thead>
                <tr>
                    <th>英語</th>
                    <th>日本語</th>
                    <th>不明1</th>
                    <th>不明2</th>
                    <th>不明3</th>
                    <th>合格</th>
                    <th>削除</th>
                </tr>
            </thead> -->
            <thead>
                <tr>
                    <th rowspan="2" class="col-word">英語</th>
                    <th rowspan="2" class="col-meaning">日本語</th>
                    <th colspan="3" class="col-group">不明</th>
                    <th rowspan="2" class="col-check">合格</th>
                    <!-- <th rowspan="2" class="col-delete">削除</th> -->
                    <th rowspan="2" class="col-delete delete-col">削除</th>
                </tr>
                <tr>
                    <th class="col-check">1</th>
                    <th class="col-check">2</th>
                    <th class="col-check">3</th>
                </tr>
            </thead>
            <tbody id="wordListBody"></tbody>
        </table>
        </div>
    </div>

    <!-- テストモード -->
    <div id="test-mode" class="mode" style="display:none;">
        <h2>テスト</h2>
        <div class="test-config">
            <label><input type="radio" name="testType" value="en" checked> 英語を出題</label>
            <label><input type="radio" name="testType" value="ja"> 日本語を出題</label>
        </div>
        
        <div id="test-card">
            <div id="question-area">
                <p class="label">問題:</p>
                <p id="question-text" class="main-text"></p>
            </div>
            <div id="answer-area" style="display:none;">
                <hr>
                <p class="label">答え:</p>
                <p id="answer-text" class="main-text"></p>
                
                <div class="test-result-btns">
                    <button class="pass-btn" onclick="handleTestResult(true)">正解（合格）</button>
                    <button class="fail-btn" onclick="showFailOptions()">不正解</button>
                </div>

                <div id="fail-options" style="display:none;">
                    <p>チェックを選択してください：</p>
                    <button onclick="setCheckAndNext(1)">1:初めて見て不明</button>
                    <button onclick="setCheckAndNext(2)">2:一度覚えたのに不明</button>
                    <button onclick="setCheckAndNext(3)">3:三度目以降も不明</button>
                </div>
            </div>
            <button id="showAnswerBtn">答えを見る</button>
        </div>

        <div class="nav-btns">
            <button onclick="prevWord()">前へ</button>
            <span id="test-progress">0 / 0</span>
            <button onclick="nextWord()">次へ</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
